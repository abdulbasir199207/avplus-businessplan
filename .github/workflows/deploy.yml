# ═══════════════════════════════════════════════════════════════════
# Auto-Deploy zu IONOS: Bei jedem Push auf `master` werden die
# Webseiten-Dateien per SFTP auf den IONOS-Webspace hochgeladen.
#
# Voraussetzung — drei Secrets im GitHub-Repo hinterlegen
# (Settings → Secrets and variables → Actions → New repository secret):
#   SFTP_HOST      z. B. access-1234567890.webspace-host.com
#   SFTP_USER      SFTP-Benutzername aus dem IONOS-Konto
#   SFTP_PASSWORD  zugehöriges Passwort
# Die Zugangsdaten stehen bei IONOS unter Hosting → SFTP & SSH.
#
# Hinweis: IONOS erlaubt keine Domain-Verbindung aufs Stammverzeichnis,
# daher wird nach /public deployt — avplus.at muss im IONOS-Kundenkonto
# mit dem Ordner "public" verbunden sein.
# ═══════════════════════════════════════════════════════════════════
name: Deploy zu IONOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Deploy-Ordner zusammenstellen (nur Live-Dateien)
        run: |
          mkdir -p deploy/bilder
          cp *.html site.js cookie-consent.js kontakt-inline.js kontakt-inline.css tracking.js clarity.js \
             logo.png favicon.ico favicon-16x16.png favicon-32x32.png favicon-48x48.png favicon-96x96.png apple-touch-icon.png \
             robots.txt sitemap.xml llms.txt agb-kommunikationselektroniker.pdf .htaccess deploy/
          # Nur Bilder mitnehmen, die in HTML/CSS/JS referenziert sind
          grep -hoE 'bilder/[A-Za-z0-9_.-]+\.(webp|png|jpg|jpeg|svg|mp4|webm)' *.html *.js *.css \
            | sort -u \
            | while read -r f; do
                [ -f "$f" ] && cp "$f" deploy/bilder/
              done
          echo "Dateien im Deploy-Ordner: $(find deploy -type f | wc -l)"

      - name: Upload per SFTP zu IONOS
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          local_path: ./deploy/*
          remote_path: /public
          sftp_only: true

      # Der Glob ./deploy/* überspringt versteckte Dateien —
      # die .htaccess muss deshalb separat hochgeladen werden.
      - name: .htaccess per SFTP hochladen
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          local_path: ./deploy/.htaccess
          remote_path: /public
          sftp_only: true
